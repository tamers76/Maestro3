name: Deploy to Azure VM

# Build + restart the Maestro backend on the Azure VM on every push to main.
# The VM pulls the (public) repo itself; this job just triggers the VM-side
# scripts/deploy.sh over SSH.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never run two deploys at once; let an in-flight deploy finish before the next.
concurrency:
  group: deploy-azure-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          command_timeout: 20m
          script: bash /opt/maestro/scripts/deploy.sh
